# Netlify configuration for Jyväskylä Cricket Club

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect rules for old URLs (HTML extensions)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/members.html"
  to = "/members"
  status = 301

[[redirects]]
  from = "/join_us.html"
  to = "/join_us"
  status = 301

[[redirects]]
  from = "/fixtures.html"
  to = "/fixtures"
  status = 301

[[redirects]]
  from = "/gallery.html"
  to = "/gallery"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/expense_form.html"
  to = "/expense_form"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache PDFs
[[headers]]
  for = "/pdfs/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
